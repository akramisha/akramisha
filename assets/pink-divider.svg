<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 18"
  preserveAspectRatio="none"
>
  <defs>
    <linearGradient id="pinkLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBCFE8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F9A8D4"/>
      <stop offset="50%" stop-color="#DB2777"/>
      <stop offset="80%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#FBCFE8" stop-opacity="0"/>
    </linearGradient>

    <filter id="pinkGlow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect
    x="55"
    y="8"
    width="1090"
    height="2"
    rx="1"
    fill="url(#pinkLine)"
    filter="url(#pinkGlow)"
  />

  <rect
    x="594"
    y="3"
    width="12"
    height="12"
    rx="3"
    transform="rotate(45 600 9)"
    fill="#EC4899"
  />

  <circle cx="570" cy="9" r="3" fill="#F9A8D4"/>
  <circle cx="630" cy="9" r="3" fill="#F9A8D4"/>
</svg>